<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Bingo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF7EC;
    --ink-text:#2A1B3D;
    --dab:#FF1F8E;
    --B:#FF4757; --I:#FF8A1F; --N:#2BB673; --G:#2E86FF; --O:#B14EFF;
    --bg1:#241046; --bg2:#3A1A6B;
    --shadow:rgba(20,8,45,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink-text);
    background:
      radial-gradient(circle at 18% 12%, rgba(255,138,31,.15), transparent 40%),
      radial-gradient(circle at 82% 88%, rgba(177,78,255,.18), transparent 44%),
      linear-gradient(155deg, rgba(36,16,70,.62), rgba(58,26,107,.55)),
      url("egyptian-pyramids-3440x1440-18797.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 56px;
  }

  header{text-align:center; margin-bottom:18px;}
  .title{
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:clamp(2.4rem,9vw,3.4rem);
    letter-spacing:.5px;
    line-height:.95;
    color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.25);
  }
  .title span:nth-child(1){color:var(--B);}
  .title span:nth-child(2){color:var(--I);}
  .title span:nth-child(3){color:var(--N);}
  .title span:nth-child(4){color:var(--G);}
  .title span:nth-child(5){color:var(--O);}
  .subtitle{
    margin-top:8px;
    color:rgba(255,255,255,.75);
    font-size:.95rem;
    font-weight:500;
  }
  .lang{
    display:inline-flex;
    margin-top:14px;
    background:rgba(255,255,255,.12);
    border-radius:999px;
    padding:4px;
    gap:4px;
  }
  .lang button{
    font-family:"Fredoka",sans-serif;
    font-weight:600;
    font-size:.85rem;
    letter-spacing:.5px;
    color:rgba(255,255,255,.7);
    background:transparent;
    border:none;
    padding:6px 16px;
    border-radius:999px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .lang button.active{background:#fff; color:var(--bg1);}
  .lang button:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  .card{
    background:var(--paper);
    border-radius:22px;
    padding:16px;
    width:min(560px,100%);
    box-shadow:0 18px 50px var(--shadow), inset 0 0 0 4px rgba(255,255,255,.6);
    position:relative;
  }

  .headers, .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
  }
  .headers{margin-bottom:8px;}
  .col-h{
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:clamp(1.5rem,6vw,2.1rem);
    color:#fff;
    text-align:center;
    border-radius:12px;
    padding:6px 0;
    box-shadow:0 4px 0 rgba(0,0,0,.18);
  }
  .col-h:nth-child(1){background:var(--B);}
  .col-h:nth-child(2){background:var(--I);}
  .col-h:nth-child(3){background:var(--N);}
  .col-h:nth-child(4){background:var(--G);}
  .col-h:nth-child(5){background:var(--O);}

  .cell{
    position:relative;
    aspect-ratio:1/1;
    border:none;
    border-radius:12px;
    background:#fffefb;
    box-shadow:inset 0 0 0 2px rgba(42,27,61,.10);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:5px;
    font-family:"Fredoka",sans-serif;
    font-weight:500;
    font-size:clamp(.58rem,2.1vw,.78rem);
    line-height:1.12;
    color:var(--ink-text);
    overflow:hidden;
    transition:transform .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .cell:hover{transform:translateY(-2px);}
  .cell:focus-visible{outline:3px solid var(--G); outline-offset:2px;}
  .cell .label{position:relative; z-index:2; user-select:none;}
  .cell .label .sub{
    display:block;
    margin-top:3px;
    font-size:.8em;
    font-weight:400;
    font-style:italic;
    line-height:1.05;
    color:rgba(42,27,61,.38);
  }
  .cell.marked .label .sub{color:rgba(255,255,255,.72);}

  /* the ink dab — the signature stamp */
  .cell .dab{
    position:absolute;
    inset:0;
    margin:auto;
    width:88%;
    height:88%;
    border-radius:50% 48% 52% 49% / 49% 52% 48% 51%;
    background:radial-gradient(circle at 38% 34%, #ff5fb0, var(--dab) 70%);
    mix-blend-mode:multiply;
    opacity:0;
    transform:scale(0) rotate(-25deg);
    z-index:1;
    pointer-events:none;
  }
  .cell.marked .dab{
    animation:stamp .28s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .cell.marked .label{color:#fff; font-weight:600;}
  @keyframes stamp{
    0%{opacity:0; transform:scale(.2) rotate(-25deg);}
    60%{opacity:.96; transform:scale(1.08) rotate(4deg);}
    100%{opacity:.94; transform:scale(1) rotate(0deg);}
  }

  .cell.free{background:#FFE7B3; box-shadow:inset 0 0 0 2px rgba(255,138,31,.5);}
  .cell.free .label{font-weight:700; color:#A65A00;}
  .cell.wild .label{font-style:italic;}

  .cell.in-line{box-shadow:inset 0 0 0 3px #FFD93B, 0 0 0 2px #FFD93B;}

  /* controls */
  .controls{
    display:flex;
    gap:10px;
    margin-top:18px;
    width:min(560px,100%);
  }
  .btn{
    flex:1 1 0;
    min-width:0;
    white-space:nowrap;
    text-align:center;
    font-family:"Fredoka",sans-serif;
    font-weight:600;
    font-size:1rem;
    padding:13px 10px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:#fff;
    box-shadow:0 5px 0 rgba(0,0,0,.22);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .btn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.22);}
  .btn.shuffle{background:linear-gradient(180deg,#2E86FF,#1f6ad6);}
  .btn.reset{background:linear-gradient(180deg,#FF8A1F,#e0710c);}

  .scoreline{
    margin-top:14px;
    color:rgba(255,255,255,.85);
    font-weight:500;
    font-size:.95rem;
  }
  .scoreline b{color:#fff;}

  /* BINGO banner */
  .banner{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:50;
    opacity:0;
  }
  .banner.show{animation:bannerPop 1.8s ease forwards;}
  .banner-text{
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:clamp(3rem,18vw,7rem);
    color:#fff;
    text-shadow:0 0 24px var(--dab), 0 6px 0 rgba(0,0,0,.3);
    transform:scale(.5) rotate(-6deg);
  }
  .banner.show .banner-text{animation:textPop 1.8s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes bannerPop{0%{opacity:0;}10%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
  @keyframes textPop{0%{transform:scale(.5) rotate(-6deg);}40%{transform:scale(1.1) rotate(3deg);}100%{transform:scale(1) rotate(0);}}

  .confetti-piece{position:fixed; top:-12px; width:9px; height:14px; z-index:40; pointer-events:none; border-radius:2px;}

  @media (prefers-reduced-motion: reduce){
    .cell.marked .dab{animation:none; opacity:.94; transform:scale(1);}
    .banner.show, .banner.show .banner-text{animation:none; opacity:1; transform:none;}
    .confetti-piece{display:none;}
  }

  .btn.lb{background:linear-gradient(180deg,#2BB673,#1f9259);}

  .lb-overlay{
    position:fixed; inset:0; background:rgba(15,6,35,.72);
    display:flex; align-items:flex-start; justify-content:center;
    padding:24px 14px; z-index:60; overflow:auto;
  }
  .lb-overlay[hidden]{display:none;}
  .lb-modal{
    background:var(--paper); color:var(--ink-text);
    width:min(460px,100%); border-radius:20px; padding:22px;
    box-shadow:0 22px 60px rgba(0,0,0,.5); position:relative;
  }
  .lb-close{
    position:absolute; top:10px; right:14px; border:none; background:transparent;
    font-size:1.9rem; line-height:1; cursor:pointer; color:var(--ink-text); opacity:.55;
  }
  .lb-close:hover{opacity:1;}
  .lb-title{font-family:"Fredoka",sans-serif; font-size:1.55rem; margin-bottom:14px;}
  .lb-me{display:flex; gap:8px; margin-bottom:8px;}
  .lb-name{
    flex:1; border:2px solid rgba(42,27,61,.18); border-radius:12px;
    padding:10px 12px; font-family:"Inter",sans-serif; font-size:1rem; color:var(--ink-text);
  }
  .lb-name:focus{outline:none; border-color:var(--G);}
  .btn.save{flex:0 0 auto; background:linear-gradient(180deg,#FF1F8E,#d40f6f); padding:10px 16px; font-size:.95rem; box-shadow:0 4px 0 rgba(0,0,0,.2);}
  .lb-msg{min-height:18px; font-size:.85rem; font-weight:600; margin-bottom:6px;}
  .lb-msg.ok{color:#1f9259;}
  .lb-msg.err{color:#d40f6f;}
  .lb-section-title{font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.05rem; margin:14px 0 8px;}
  .lb-row{
    display:grid; grid-template-columns:32px 1fr auto auto auto; gap:8px; align-items:center;
    padding:8px 10px; border-radius:10px; background:#fffdf8;
    box-shadow:inset 0 0 0 1px rgba(42,27,61,.08); margin-bottom:6px;
  }
  .lb-pos{font-family:"Fredoka",sans-serif; font-weight:700; font-size:1.05rem; text-align:center;}
  .lb-name-cell{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-stat{font-size:.8rem; color:#5a4a6b; white-space:nowrap;}
  .lb-recent-row{
    display:grid; grid-template-columns:1fr auto auto; gap:8px;
    font-size:.85rem; padding:6px 10px; color:#5a4a6b;
  }
  .lb-ago{opacity:.7;}
  .lb-empty{padding:14px; text-align:center; color:#5a4a6b; font-size:.9rem; line-height:1.4;}
  .lb-empty.err{color:#d40f6f;}
  .lb-refresh{
    margin-top:14px; width:100%; border:none; border-radius:12px; cursor:pointer;
    padding:10px; font-family:"Fredoka",sans-serif; font-weight:600;
    background:rgba(42,27,61,.08); color:var(--ink-text);
  }
  .lb-refresh:hover{background:rgba(42,27,61,.14);}

  /* mascot: the man, standing on top of the white panel above the B */
  .mascot{
    position:absolute;
    bottom:100%;           /* feet rest on the top edge of the card */
    left:14px;             /* above the B column */
    height:130px;
    width:auto;
    z-index:5;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.45));
    user-select:none;
    pointer-events:none;
  }
  @media (max-width:560px){ .mascot{height:96px; left:8px;} }
</style>
</head>
<body>
  <header>
    <div class="title"><span>R</span><span>I</span><span>Z</span><span>Z</span><span> </span>BINGO</div>
    <div class="subtitle" id="subtitle">Dab a square every time he says it. Get 5 in a row.</div>
    <div class="lang">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="pt">PT</button>
    </div>
  </header>

  <div class="card">
    <img src="man.png" alt="" class="mascot" aria-hidden="true">
    <div class="headers">
      <div class="col-h">B</div><div class="col-h">I</div><div class="col-h">N</div><div class="col-h">G</div><div class="col-h">O</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="controls">
    <button class="btn shuffle" id="shuffle">Shuffle</button>
    <button class="btn reset" id="reset">New day</button>
    <button class="btn lb" id="open-lb">🏆</button>
  </div>

  <div class="scoreline"><b id="count">0</b> <span id="lbl-dabbed">dabbed</span> · <b id="lines">0</b> <span id="lbl-lines">line(s)</span> · <b id="total-bingos">0</b> <span id="lbl-bingos">bingos</span></div>

  <div class="lb-overlay" id="lb-overlay" hidden>
    <div class="lb-modal">
      <button class="lb-close" id="lb-close" aria-label="Close">×</button>
      <div class="lb-title" id="lb-title">🏆 Leaderboard</div>
      <div class="lb-me">
        <input id="lb-name" class="lb-name" placeholder="Your name" maxlength="20">
        <button class="btn save" id="lb-save">Save result</button>
      </div>
      <div class="lb-msg" id="lb-msg"></div>
      <div class="lb-section-title" id="lb-rank-title">Ranking</div>
      <div id="lb-rank"></div>
      <div class="lb-section-title" id="lb-recent-title">Recent</div>
      <div id="lb-recent"></div>
      <button class="lb-refresh" id="lb-refresh">Refresh</button>
    </div>
  </div>

  <div class="banner" id="banner"><div class="banner-text">BINGO!</div></div>

<script src="phrases.js"></script>
<script>
  // PHRASES is loaded from phrases.js — edit that file to add phrases.
  const FREE_INDEX = 12;

  const I18N = {
    en:{ subtitle:"Dab a square every time he says it. Get 5 in a row.", shuffle:"Shuffle", reset:"New day", free:"FREE", dabbed:"dabbed", lines:"line(s)",
      leaderboard:"Leaderboard", yourName:"Your name", save:"Save result", ranking:"Ranking", recent:"Recent", refresh:"Refresh",
      saved:"Saved!", saveErr:"Couldn't save — check your connection", loadErr:"Couldn't load scores", needName:"Type your name first",
      noScores:"No scores yet — be the first!", loading:"Loading…", winsShort:"wins", linesShort:"lines", bingos:"bingos",
      notConfigured:"Leaderboard not set up yet. Add your Supabase URL and key near the top of the script to enable it." },
    pt:{ subtitle:"Marque um quadrado cada vez que ele falar. Faça 5 em linha.", shuffle:"Embaralhar", reset:"Novo dia", free:"LIVRE", dabbed:"marcados", lines:"linha(s)",
      leaderboard:"Placar", yourName:"Seu nome", save:"Salvar resultado", ranking:"Ranking", recent:"Recentes", refresh:"Atualizar",
      saved:"Salvo!", saveErr:"Não foi possível salvar — verifique a conexão", loadErr:"Não foi possível carregar", needName:"Digite seu nome primeiro",
      noScores:"Ainda sem pontuações — seja o primeiro!", loading:"Carregando…", winsShort:"vit.", linesShort:"linhas", bingos:"bingos",
      notConfigured:"Placar ainda não configurado. Adicione a URL e a chave do Supabase no início do script para ativar." }
  };
  let lang = 'en';

  const grid = document.getElementById('grid');
  const banner = document.getElementById('banner');
  const countEl = document.getElementById('count');
  const linesEl = document.getElementById('lines');
  const totalBingosEl = document.getElementById('total-bingos');

  let cells = [];          // 25 entries
  let completedLines = new Set();
  let boardStart = null;   // ms when first dab happened
  let bingoSeconds = null; // time to first BINGO
  let totalBingos = parseInt(lsGet('rizz_bingos') || '0', 10) || 0;  // lifetime BINGO count (lsGet is hoisted)

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function buildBoard(){
    const pool = shuffle(PHRASES);   // 24 phrases
    cells = [];
    let p = 0;
    for(let i=0;i<25;i++){
      if(i===FREE_INDEX){
        cells.push({t:"FREE", marked:true, free:true, wild:false});
      }else{
        const ph = pool[p++];
        cells.push({t:ph.t, l:ph.l, en:ph.en, pt:ph.pt, marked:false, free:false, wild:false});
      }
    }
    completedLines = new Set();
    boardStart = null; bingoSeconds = null;
    render();
    updateScore();
    saveState();
  }

  function render(){
    grid.innerHTML = "";
    cells.forEach((c,i)=>{
      const btn = document.createElement('button');
      btn.className = "cell" + (c.marked?" marked":"") + (c.free?" free":"") + (c.wild?" wild":"");
      btn.setAttribute('aria-pressed', c.marked);
      btn.dataset.i = i;
      const original = c.free ? I18N[lang].free : (c.t || c.label || "");
      let subHtml = "";
      if(!c.free && c.l && c.l !== lang){
        const tr = lang==='pt' ? c.pt : c.en;
        if(tr) subHtml = `<span class="sub">${tr}</span>`;
      }
      btn.innerHTML = `<span class="dab"></span><span class="label">${original}${subHtml}</span>`;
      if(!c.free){
        btn.addEventListener('click', ()=>toggle(i, btn));
      }else{
        btn.style.cursor = "default";
      }
      grid.appendChild(btn);
    });
  }

  function toggle(i, btn){
    cells[i].marked = !cells[i].marked;
    btn.classList.toggle('marked', cells[i].marked);
    btn.setAttribute('aria-pressed', cells[i].marked);
    if(cells[i].marked && boardStart===null) boardStart = Date.now();
    checkBingo();
    updateScore();
    saveState();
  }

  // all 12 winning lines
  const LINES = (()=>{
    const L = [];
    for(let r=0;r<5;r++) L.push([0,1,2,3,4].map(c=>r*5+c));
    for(let c=0;c<5;c++) L.push([0,1,2,3,4].map(r=>r*5+c));
    L.push([0,6,12,18,24]);
    L.push([4,8,12,16,20]);
    return L;
  })();

  function checkBingo(){
    let fresh = false;
    let newLines = 0;
    LINES.forEach((line,idx)=>{
      const done = line.every(i=>cells[i].marked);
      if(done && !completedLines.has(idx)){
        completedLines.add(idx);
        fresh = true;
        newLines++;
      }
      if(!done) completedLines.delete(idx);
    });
    if(newLines>0){
      totalBingos += newLines;
      lsSet('rizz_bingos', String(totalBingos));
    }
    // highlight cells that belong to any completed line
    const lit = new Set();
    completedLines.forEach(idx=>LINES[idx].forEach(i=>lit.add(i)));
    document.querySelectorAll('.cell').forEach(el=>{
      el.classList.toggle('in-line', lit.has(+el.dataset.i));
    });
    if(fresh){
      if(bingoSeconds===null && boardStart!==null) bingoSeconds = Math.round((Date.now()-boardStart)/1000);
      celebrate();
    }
  }

  function updateScore(){
    countEl.textContent = cells.filter(c=>c.marked && !c.free).length;
    linesEl.textContent = completedLines.size;
    totalBingosEl.textContent = totalBingos;
  }

  function celebrate(){
    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
    const colors = ['#FF4757','#FF8A1F','#2BB673','#2E86FF','#B14EFF','#FF1F8E','#FFD93B'];
    for(let i=0;i<60;i++){
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random()*100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random()*colors.length)];
      const dur = 1.5 + Math.random()*1.4;
      const drift = (Math.random()*200-100);
      piece.animate([
        {transform:`translate(0,0) rotate(0deg)`, opacity:1},
        {transform:`translate(${drift}px, 105vh) rotate(${720+Math.random()*360}deg)`, opacity:1}
      ], {duration:dur*1000, easing:'cubic-bezier(.2,.6,.4,1)'});
      document.body.appendChild(piece);
      setTimeout(()=>piece.remove(), dur*1000);
    }
  }

  document.getElementById('shuffle').addEventListener('click', buildBoard);
  document.getElementById('reset').addEventListener('click', ()=>{
    cells.forEach(c=>{ if(!c.free) c.marked=false; });
    completedLines = new Set();
    boardStart = null; bingoSeconds = null;
    render();
    updateScore();
    saveState();
  });

  function applyLang(){
    const t = I18N[lang];
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('shuffle').textContent = t.shuffle;
    document.getElementById('reset').textContent = t.reset;
    document.getElementById('open-lb').textContent = "🏆 " + t.leaderboard;
    document.getElementById('lbl-dabbed').textContent = t.dabbed;
    document.getElementById('lbl-lines').textContent = t.lines;
    document.getElementById('lbl-bingos').textContent = t.bingos;
    document.getElementById('lb-title').textContent = "🏆 " + t.leaderboard;
    document.getElementById('lb-name').placeholder = t.yourName;
    document.getElementById('lb-save').textContent = t.save;
    document.getElementById('lb-rank-title').textContent = t.ranking;
    document.getElementById('lb-recent-title').textContent = t.recent;
    document.getElementById('lb-refresh').textContent = t.refresh;
    document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
    document.documentElement.lang = lang;
    render();
    checkBingo();
    if(!document.getElementById('lb-overlay').hidden) loadLeaderboard();
  }

  document.querySelectorAll('.lang button').forEach(b=>{
    b.addEventListener('click', ()=>{ lang = b.dataset.lang; applyLang(); });
  });

  const SUPABASE_URL = "https://dzkcsbnkijuutdcthsjj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_Wq1I-FYYZrAUc0AFF3URXQ_bo8pP5BH";
  const LB_TABLE = "scores";
  const lbReady = ()=> SUPABASE_URL.trim() && SUPABASE_KEY.trim();

  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  let playerName = lsGet('rizz_name') || "";

  // ---- session persistence: keep the same board + marks across refresh (F5) ----
  const STATE_KEY = 'rizz_board';
  function saveState(){
    lsSet(STATE_KEY, JSON.stringify({
      cells, completed:[...completedLines], boardStart, bingoSeconds
    }));
  }
  function loadState(){
    try{
      const raw = lsGet(STATE_KEY);
      if(!raw) return false;
      const s = JSON.parse(raw);
      if(!Array.isArray(s.cells) || s.cells.length!==25) return false;
      // reject boards saved before the bilingual format (no `t`/`l` fields)
      const stale = s.cells.some(c=>!c.free && (c.t===undefined || c.l===undefined));
      if(stale) return false;
      cells = s.cells;
      completedLines = new Set(s.completed||[]);
      boardStart = s.boardStart ?? null;
      bingoSeconds = s.bingoSeconds ?? null;
      render();
      checkBingo();   // re-highlights finished lines; nothing is "fresh" so no celebration
      updateScore();
      return true;
    }catch(e){ return false; }
  }

  function sbHeaders(extra){
    return Object.assign({
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    }, extra||{});
  }
  function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
  function fmtTime(s){ if(s==null) return "—"; const m=Math.floor(s/60), ss=s%60; return m? `${m}m${String(ss).padStart(2,"0")}s` : `${ss}s`; }
  function fmtAgo(iso){
    const d=(Date.now()-new Date(iso).getTime())/1000;
    if(d<60) return Math.max(0,Math.round(d))+"s";
    if(d<3600) return Math.round(d/60)+"m";
    if(d<86400) return Math.round(d/3600)+"h";
    return Math.round(d/86400)+"d";
  }
  function showLbMsg(text, isErr){
    const el=document.getElementById('lb-msg');
    el.textContent=text; el.className="lb-msg"+(isErr?" err":" ok");
    if(text) setTimeout(()=>{ if(el.textContent===text) el.textContent=""; }, 3000);
  }

  async function fetchScores(){
    const base=SUPABASE_URL.replace(/\/$/,"");
    const url=`${base}/rest/v1/${LB_TABLE}?select=name,lines,dabbed,won,seconds,created_at&order=created_at.desc&limit=300`;
    const res=await fetch(url, { headers: sbHeaders() });
    if(!res.ok) throw new Error("fetch "+res.status);
    return res.json();
  }

  async function submitScore(){
    const t=I18N[lang];
    const name=(document.getElementById('lb-name').value||"").trim();
    if(!name){ showLbMsg(t.needName, true); return; }
    if(!lbReady()){ showLbMsg(t.notConfigured, true); return; }
    playerName=name; lsSet('rizz_name', name);
    const lines=completedLines.size;
    const dabbed=cells.filter(c=>c.marked && !c.free).length;
    const won=lines>0;
    const seconds=(won && bingoSeconds!==null) ? bingoSeconds : null;
    const base=SUPABASE_URL.replace(/\/$/,"");
    try{
      const res=await fetch(`${base}/rest/v1/${LB_TABLE}`, {
        method:"POST", headers: sbHeaders({ "Prefer":"return=minimal" }),
        body: JSON.stringify({ name, lines, dabbed, won, seconds })
      });
      if(!res.ok) throw new Error("insert "+res.status);
      showLbMsg(t.saved, false);
      loadLeaderboard();
    }catch(e){ showLbMsg(t.saveErr, true); }
  }

  function aggregate(rows){
    const map=new Map();
    rows.forEach(r=>{
      const name=(r.name||"?").trim(), k=name.toLowerCase();
      if(!map.has(k)) map.set(k, { name, wins:0, games:0, best:0, fastest:null });
      const a=map.get(k);
      a.games++;
      if(r.won) a.wins++;
      if((r.lines||0)>a.best) a.best=r.lines||0;
      if(r.won && r.seconds!=null && (a.fastest===null || r.seconds<a.fastest)) a.fastest=r.seconds;
    });
    return [...map.values()].sort((x,y)=> y.wins-x.wins || y.best-x.best || ((x.fastest??1e9)-(y.fastest??1e9)) || x.name.localeCompare(y.name));
  }

  async function loadLeaderboard(){
    const t=I18N[lang];
    const rankEl=document.getElementById('lb-rank');
    const recentEl=document.getElementById('lb-recent');
    if(!lbReady()){ rankEl.innerHTML=`<div class="lb-empty">${t.notConfigured}</div>`; recentEl.innerHTML=""; return; }
    rankEl.innerHTML=`<div class="lb-empty">${t.loading}</div>`; recentEl.innerHTML="";
    try{
      const rows=await fetchScores();
      if(!rows.length){ rankEl.innerHTML=`<div class="lb-empty">${t.noScores}</div>`; return; }
      const medals=["🥇","🥈","🥉"];
      rankEl.innerHTML=aggregate(rows).map((a,i)=>`
        <div class="lb-row">
          <span class="lb-pos">${medals[i]||(i+1)}</span>
          <span class="lb-name-cell">${esc(a.name)}</span>
          <span class="lb-stat">${a.wins} ${t.winsShort}</span>
          <span class="lb-stat">🔥${a.best}</span>
          <span class="lb-stat">⏱${fmtTime(a.fastest)}</span>
        </div>`).join("");
      recentEl.innerHTML=rows.slice(0,12).map(r=>`
        <div class="lb-recent-row">
          <span>${esc(r.name)}</span>
          <span>${r.won? "🎉 "+r.lines : (r.lines||0)+" "+t.linesShort}</span>
          <span class="lb-ago">${fmtAgo(r.created_at)}</span>
        </div>`).join("");
    }catch(e){ rankEl.innerHTML=`<div class="lb-empty err">${t.loadErr}</div>`; }
  }

  function openLB(){
    document.getElementById('lb-name').value=playerName;
    document.getElementById('lb-overlay').hidden=false;
    loadLeaderboard();
  }
  function closeLB(){ document.getElementById('lb-overlay').hidden=true; }

  document.getElementById('open-lb').addEventListener('click', openLB);
  document.getElementById('lb-close').addEventListener('click', closeLB);
  document.getElementById('lb-refresh').addEventListener('click', loadLeaderboard);
  document.getElementById('lb-save').addEventListener('click', submitScore);
  document.getElementById('lb-overlay').addEventListener('click', e=>{ if(e.target.id==='lb-overlay') closeLB(); });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLB(); });

  if(!loadState()) buildBoard();   // restore saved board on refresh, else start fresh
  applyLang();
</script>
</body>
</html>
