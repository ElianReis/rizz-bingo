<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Bingo</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- load fonts without blocking render/JS; they swap in when ready -->
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"></noscript>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <audio id="song" src="assets/audio/song.mp3" loop preload="none"></audio>
  <button id="music-toggle" class="music-btn" aria-label="Toggle music" aria-pressed="false">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 4v11.5a3.5 3.5 0 1 1-2-3.16V7.27L10 9.07V17.5a3.5 3.5 0 1 1-2-3.16V6.2l13-2.6z"/>
      <line class="slash" x1="3.5" y1="3.5" x2="20.5" y2="20.5"/>
    </svg>
  </button>
  <img src="assets/images/camel.webp?v=4" alt="" class="camel" aria-hidden="true" loading="lazy" decoding="async">
  <header>
    <div class="title"><span>R</span><span>I</span><span>Z</span><span>Z</span><span> </span>BINGO</div>
    <div class="subtitle" id="subtitle"></div>
    <div class="lang">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="pt">PT</button>
    </div>
  </header>

  <div class="card">
    <img src="assets/images/man.webp?v=1" alt="" class="mascot" aria-hidden="true" decoding="async">
    <div class="headers">
      <div class="col-h">B</div><div class="col-h">I</div><div class="col-h">N</div><div class="col-h">G</div><div class="col-h">O</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="controls">
    <button class="btn shuffle" id="shuffle"></button>
    <button class="btn reset" id="reset"></button>
    <button class="btn lb" id="open-lb">🏆</button>
  </div>

  <div class="scoreline"><b id="count">0</b> <span id="lbl-dabbed"></span> · <b id="lines">0</b> <span id="lbl-lines"></span> · <b id="total-bingos">0</b> <span id="lbl-bingos"></span></div>

  <div class="lb-overlay" id="lb-overlay" hidden>
    <div class="lb-modal">
      <button class="lb-close" id="lb-close" aria-label="Close">×</button>
      <div class="lb-title" id="lb-title">🏆 Leaderboard</div>
      <div class="lb-me">
        <input id="lb-name" class="lb-name" placeholder="Your name" maxlength="20">
        <button class="btn save" id="lb-save">Save result</button>
      </div>
      <div class="lb-msg" id="lb-msg"></div>
      <div class="lb-section-title" id="lb-rank-title">Ranking</div>
      <div id="lb-rank"></div>
      <div class="lb-section-title" id="lb-recent-title">Recent</div>
      <div id="lb-recent"></div>
      <button class="lb-refresh" id="lb-refresh">Refresh</button>
    </div>
  </div>

  <div class="banner" id="banner"><div class="banner-text">BINGO!</div></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
